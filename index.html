const STORAGE_KEY = 'portfolio-dashboard-v1';
const API_KEY_STORAGE = 'gemini-api-key';

const loadData = () => {
  try {
    const v = localStorage.getItem(STORAGE_KEY);
    return v ? JSON.parse(v) : null;
  } catch {
    return null;
  }
};

const saveData = (data) => {
  try {
    // Deduplicate ETF holdings before saving
    const normalizeEtfTicker = (ticker) => {
      return ticker.replace(/\s*[\(\[]IE[A-Z0-9]+[\)\]]\s*/g, '').trim();
    };

    if (data && data.positions && data.positions.etfDE && Array.isArray(data.positions.etfDE.holdings)) {
      const holdings = data.positions.etfDE.holdings;
      const holdingsByNormalized = {};

      holdings.forEach(h => {
        if (!h || !h.ticker) return;
        const normalized = normalizeEtfTicker(h.ticker);
        if (!holdingsByNormalized[normalized]) {
          holdingsByNormalized[normalized] = { ticker: h.ticker, wertCHF: 0, plPct: 0, count: 0 };
        }
        holdingsByNormalized[normalized].wertCHF += h.wertCHF || 0;
        holdingsByNormalized[normalized].plPct += h.plPct || 0;
        holdingsByNormalized[normalized].count += 1;
      });

      const deduped = Object.values(holdingsByNormalized);
      if (deduped.length < holdings.length) {
        // Create a copy to avoid mutating the original
        const dataCopy = JSON.parse(JSON.stringify(data));
        dataCopy.positions.etfDE.holdings = deduped.map(h => ({
          ticker: h.ticker,
          wertCHF: h.wertCHF,
          plPct: h.count > 0 ? h.plPct / h.count : 0,
        }));
        dataCopy.positions.etfDE.wertCHF = dataCopy.positions.etfDE.holdings.reduce((sum, h) => sum + h.wertCHF, 0);
        const totalWert = dataCopy.positions.etfDE.wertCHF;
        dataCopy.positions.etfDE.plPct = totalWert > 0
          ? dataCopy.positions.etfDE.holdings.reduce((sum, h) => sum + (h.plPct * h.wertCHF), 0) / totalWert
          : 0;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dataCopy));
        return;
      }
    }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error('Save failed:', e);
  }
};

const CLAUDE_WORKER_URL = 'https://portfolio.y68xps2sdk.workers.dev'; // Worker hält den API-Key serverseitig
const CLAUDE_MODEL = 'claude-haiku-4-5-20251001'; // bei Bedarf editierbar

const JSON_RULES = `WICHTIG: Antworte AUSSCHLIESSLICH mit reinem JSON. Kein Markdown, keine Code-Fences, kein Erklärungstext, keine Einleitung. Beginne direkt mit { und ende mit }. Wenn ein Wert nicht erkennbar ist, gib 0 zurück.`;

// Tagesaktuelle Wechselkurse holen (CHF pro 1 Einheit Fremdwährung).
// Cache: localStorage mit 1h TTL (überlebt Tab-Wechsel, vermeidet falsche Konvertierung).
let _fxCache = null;
const FX_CACHE_KEY = 'portfolio-fx-cache';
const FX_TTL_MS = 60 * 60 * 1000; // 1 Stunde

const getFxRates = async () => {
  if (_fxCache) return _fxCache;
  // localStorage-Cache prüfen
  try {
    const raw = localStorage.getItem(FX_CACHE_KEY);
    if (raw) {
      const { data, ts } = JSON.parse(raw);
      if (data && Date.now() - ts < FX_TTL_MS) {
        _fxCache = data;
        return _fxCache;
      }
    }
  } catch {}

  try {
    const r = await fetch('https://open.er-api.com/v6/latest/CHF');
    const d = await r.json();
    const rates = d?.rates;
    if (!rates || !rates.EUR) throw new Error('keine Rates');
    // rates.X = X pro 1 CHF  ->  1 X = 1/rates.X CHF
    _fxCache = {
      date: (d.time_last_update_utc || '').slice(0, 16),
      EUR: 1 / rates.EUR,
      USD: 1 / rates.USD,
      GBP: 1 / rates.GBP,
    };
    try { localStorage.setItem(FX_CACHE_KEY, JSON.stringify({ data: _fxCache, ts: Date.now() })); } catch {}
    return _fxCache;
  } catch (e) {
    // Fallback: grobe Richtwerte, falls FX-API nicht erreichbar
    return { date: 'Fallback (FX-API offline)', EUR: 0.95, USD: 0.88, GBP: 1.10 };
  }
};

// ============================================================
// LIVE-PREISE: Externe Markt-APIs (Binance, CoinGecko, Yahoo via Worker)
// ============================================================
// Mapping: Portfolio-Key -> Datenquelle + Ticker
const PRICE_SOURCES = {
  btc:    { source: 'binance',   ticker: 'BTCUSDT' },
  eth:    { source: 'binance',   ticker: 'ETHUSDT' },
  sol:    { source: 'binance',   ticker: 'SOLUSDT' },
  rndr:   { source: 'binance',   ticker: 'RNDRUSDT' },
  kas:    { source: 'coingecko', ticker: 'kaspa' },      // liefert CHF direkt
  v3aaCH: { source: 'yahoo',     ticker: 'V3AA.SW' },     // CHF (Swiss)
};
// ETF-Holdings (in etfDE.holdings) -> Yahoo-Ticker. DEAKTIVIERT, da Yahoo europäische UCITS-ETFs nicht kennt.
// Siehe PROJECT.md für ISIN-Codes + nächste Steps (Morningstar/Finnhub API).
// ETF-Updates laufen aktuell manuell über Screenshot-Upload.
const ETF_HOLDING_TICKERS = {};

// Holt alle verfügbaren Live-Preise parallel. Gibt CHF-Preise + Fehlerliste zurück.
// results-Form: { btc:{price,currency,source}, ..., yahoo:{ 'V3AA.SW':{price}, 'SUSW.DE':{price} } }
const fetchPrices = async () => {
  const fx = await getFxRates();
  const today = new Date().toISOString().slice(0, 10);
  const results = { yahoo: {} };
  const errors = [];

  // --- Binance (USDT -> CHF via fx.USD) ---
  const binanceKeys = Object.keys(PRICE_SOURCES).filter(k => PRICE_SOURCES[k].source === 'binance');
  const binancePromises = binanceKeys.map(key => {
    const { ticker } = PRICE_SOURCES[key];
    return fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${ticker}`)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => {
        const usd = parseFloat(d.price);
        if (!usd || isNaN(usd)) throw new Error('kein Preis');
        results[key] = { price: usd * fx.USD, currency: 'CHF', source: 'binance', raw: usd };
      })
      .catch(e => errors.push(`${ticker} (Binance): ${e.message}`));
  });

  // --- CoinGecko (Kaspa, liefert CHF direkt) ---
  const coingeckoPromise = fetch('https://api.coingecko.com/api/v3/simple/price?ids=kaspa&vs_currencies=chf')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(d => {
      const chf = d?.kaspa?.chf;
      if (!chf) throw new Error('kein Preis');
      results.kas = { price: chf, currency: 'CHF', source: 'coingecko' };
    })
    .catch(e => errors.push(`Kaspa (CoinGecko): ${e.message}`));

  // --- Yahoo via Worker (EUR/CHF -> CHF) ---
  const yahooTickers = new Set([
    PRICE_SOURCES.v3aaCH.ticker,
    ...Object.values(ETF_HOLDING_TICKERS),
  ]);
  const yahooPromises = [...yahooTickers].map(ticker =>
    fetch(`${CLAUDE_WORKER_URL}/api/yahoo?ticker=${encodeURIComponent(ticker)}`)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => {
        if (d.error) throw new Error(d.error);
        const price = parseFloat(d.price);
        if (!price || isNaN(price)) throw new Error('kein Preis');
        // Währung: Yahoo gibt currency mit. EUR -> CHF, CHF bleibt.
        const cur = (d.currency || 'EUR').toUpperCase();
        const chf = cur === 'CHF' ? price : cur === 'EUR' ? price * fx.EUR : cur === 'USD' ? price * fx.USD : price;
        results.yahoo[ticker] = { price: chf, currency: 'CHF', source: 'yahoo', rawCurrency: cur };
      })
      .catch(e => errors.push(`${ticker} (Yahoo): ${e.message}`))
  );

  await Promise.allSettled([...binancePromises, coingeckoPromise, ...yahooPromises]);
  return { results, errors, date: today, fx };
};

// Aktualisiert Positionen mit Live-Preisen. Reine Funktion -> gibt {newData, updated, errors}.
const updatePositionsWithPrices = (data, pricesFetch) => {
  const { results, errors, date } = pricesFetch;
  const newData = {
    ...data,
    positions: JSON.parse(JSON.stringify(data.positions)),
    history: { ...(data.history || {}) },
    meta: { ...data.meta },
  };
  let updated = 0;

  // --- Krypto: kurs setzen, wertCHF = menge * kurs, plPct neu ---
  ['btc', 'eth', 'sol', 'kas', 'rndr'].forEach(key => {
    const pr = results[key];
    const pos = newData.positions[key];
    if (!pr || !pos) return;
    const neuerKurs = pr.price;
    pos.kurs = neuerKurs;
    if (pos.menge > 0) {
      pos.wertCHF = pos.menge * neuerKurs;
      pos.plPct = pos.einstand > 0 ? ((neuerKurs - pos.einstand) / pos.einstand) * 100 : pos.plPct;
    }
    // History append (auch wenn menge=0, dokumentiert Kursverlauf)
    if (!newData.history[key]) newData.history[key] = [];
    newData.history[key] = [...newData.history[key], { date, wertCHF: pos.wertCHF }];
    updated++;
  });

  // --- V3AA Schweiz (ETF, Menge meist unbekannt -> Faktor-Skalierung) ---
  const v3 = newData.positions.v3aaCH;
  const v3pr = results.yahoo[PRICE_SOURCES.v3aaCH.ticker];
  if (v3 && v3pr) {
    const neuerKurs = v3pr.price;
    if (v3.menge > 0) {
      v3.wertCHF = v3.menge * neuerKurs;
      v3.plPct = v3.einstand > 0 ? ((neuerKurs - v3.einstand) / v3.einstand) * 100 : v3.plPct;
    } else if (v3.kurs > 0) {
      // Faktor-Skalierung: alter Wert * (neuerKurs / alterKurs)
      v3.wertCHF = v3.wertCHF * (neuerKurs / v3.kurs);
    }
    v3.kurs = neuerKurs;
    if (!newData.history.v3aaCH) newData.history.v3aaCH = [];
    newData.history.v3aaCH = [...newData.history.v3aaCH, { date, wertCHF: v3.wertCHF }];
    updated++;
  }

  // --- ETFs Deutschland (Holdings): Faktor-Skalierung pro Holding ---
  const etfDE = newData.positions.etfDE;
  if (etfDE && Array.isArray(etfDE.holdings)) {
    let anyEtfUpdated = false;
    etfDE.holdings = etfDE.holdings.map(h => {
      const yTicker = ETF_HOLDING_TICKERS[h.ticker];
      const pr = yTicker && results.yahoo[yTicker];
      if (!pr) return h;
      const neuerKurs = pr.price;
      const nh = { ...h };
      if (nh.kurs > 0) {
        // Faktor-Skalierung des Werts
        nh.wertCHF = nh.wertCHF * (neuerKurs / nh.kurs);
      }
      nh.kurs = neuerKurs;
      anyEtfUpdated = true;
      return nh;
    });
    if (anyEtfUpdated) {
      // etfDE Aggregat neu berechnen
      etfDE.wertCHF = etfDE.holdings.reduce((s, h) => s + (h.wertCHF || 0), 0);
      const tot = etfDE.wertCHF;
      etfDE.plPct = tot > 0
        ? etfDE.holdings.reduce((s, h) => s + (h.plPct || 0) * (h.wertCHF || 0), 0) / tot
        : etfDE.plPct;
      if (!newData.history.etfDE) newData.history.etfDE = [];
      newData.history.etfDE = [...newData.history.etfDE, { date, wertCHF: etfDE.wertCHF }];
      updated++;
    }
  }

  // --- Gesamt-History + Meta ---
  const newTotal = calcTotal(newData.positions);
  newData.history.total = [...(newData.history.total || []), { date, wertCHF: newTotal }];
  newData.meta.lastUpdate = date;
  newData.meta.lastUpdatePriceSource = 'live-api';

  return { newData, updated, errors };
};

// Bereinigt & parst die KI-Antwort zu JSON
const parseJsonResponse = (content) => {
  const cleaned = (content || '').replace(/```json/gi, '').replace(/```/g, '').trim();
  try { return JSON.parse(cleaned); } catch {}
  const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
  if (jsonMatch) {
    try { return JSON.parse(jsonMatch[0]); }
    catch (e) { throw new Error(`JSON gefunden aber nicht parsbar: ${jsonMatch[0].slice(0, 300)}`); }
  }
  throw new Error(`Kein JSON in Antwort: ${cleaned.slice(0, 300)}`);
};

// Komprimiert ein Bild auf max 1568px Kante und JPEG q=0.85 -> { base64, mimeType }
const compressImage = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const maxDim = 1568;
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
        else { width = Math.round((width * maxDim) / height); height = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      resolve({ base64: dataUrl.split(',')[1], mimeType: 'image/jpeg', width, height });
    };
    img.onerror = reject;
    img.src = reader.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

// Claude-Aufruf via Worker (gemeinsam für Bild + Text)
const callClaude = async (messages) => {
  let response;
  try {
    response = await fetch(CLAUDE_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 2048,
        temperature: 0,
        messages,
      }),
    });
  } catch (e) {
    throw new Error(`Netzwerk-Fehler beim Claude-Aufruf: ${e.message} (Worker erreichbar?)`);
  }

  const raw = await response.text();
  if (!response.ok) {
    throw new Error(`Claude HTTP ${response.status}: ${raw.slice(0, 400)}`);
  }

  let data;
  try { data = JSON.parse(raw); }
  catch (e) { throw new Error(`Response kein JSON: ${raw.slice(0, 300)}`); }

  const content = (data.content || []).map(b => b.text).filter(Boolean).join('\n');
  if (!content) {
    const reason = data.stop_reason || data.error?.message || '?';
    throw new Error(`Keine Antwort von Claude (${reason}): ${JSON.stringify(data).slice(0, 300)}`);
  }
  return parseJsonResponse(content);
};

// Bild direkt an Claude – erkennt Quelle + Währung selbst, rechnet in CHF um

const fmt = (n, decimals = 0) => {
  if (n == null || isNaN(n)) return '–';
  return new Intl.NumberFormat('de-CH', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(n);
};

const fmtChf = (n) => `${fmt(n, 0)} CHF`;
const fmtPct = (n) => `${n > 0 ? '+' : ''}${fmt(n, 2)}%`;
const fmtDate = (dateStr) => {
  if (!dateStr) return '–';
  const [year, month, day] = dateStr.split('-');
  return `${day}.${month}.${year}`;
};
const fmtDateShort = (dateStr) => {
  if (!dateStr) return '–';
  const [year, month, day] = dateStr.split('-');
  return `${day}.${month}`;
};

const calcTotal = (positions) => Object.values(positions).reduce((s, p) => s + (p.wertCHF || 0), 0);

const calcAllocation = (positions) => {
  const cats = { crypto: 0, etf: 0, cash: 0 };
  Object.values(positions).forEach(p => {
    if (cats[p.category] !== undefined) cats[p.category] += p.wertCHF || 0;
  });
  return cats;
};

const Dashboard = ({ data, onUpdate, onOpenUpload, onOpenSettings }) => {
  const [tab, setTab] = useState('overview');
  const [updating, setUpdating] = useState(false);
  const [updateStatus, setUpdateStatus] = useState(null); // { ok, message, errors }

  // Live-Kurse abrufen und Positionen aktualisieren
  const handleUpdatePrices = async () => {
    if (updating) return;
    setUpdating(true);
    setUpdateStatus(null);
    try {
      const result = await fetchPrices();
      const { newData, updated, errors } = updatePositionsWithPrices(data, result);
      onUpdate(newData);
      saveToCloudflare(newData);
      setUpdateStatus({
        ok: updated > 0,
        message: updated > 0
          ? `${updated} ${updated === 1 ? 'Position' : 'Positionen'} aktualisiert (${fmtDate(result.date)})`
          : 'Keine Kurse abrufbar',
        errors: errors && errors.length ? errors : null,
      });
    } catch (e) {
      setUpdateStatus({ ok: false, message: `Fehler: ${e.message}`, errors: null });
    } finally {
      setUpdating(false);
    }
  };

  // Toast nach 7s automatisch ausblenden
  useEffect(() => {
    if (!updateStatus) return;
    const t = setTimeout(() => setUpdateStatus(null), 7000);
    return () => clearTimeout(t);
  }, [updateStatus]);

  const total = calcTotal(data.positions);
  const alloc = calcAllocation(data.positions);
  const totalHistory = data.history.total || [];
  const prevTotal = totalHistory.length > 1 ? totalHistory[totalHistory.length - 2].wertCHF : total;
  const totalChange = total - prevTotal;
  const totalChangePct = prevTotal ? (totalChange / prevTotal) * 100 : 0;

  const vorsorgeTotal = Object.values(data.vorsorge).reduce((s, v) => s + v.monthly, 0);
  const targetProgress = (vorsorgeTotal / data.meta.targetMonthlyRetirement) * 100;

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-200">
      {/* TOAST */}
      {updateStatus && (
        <div className={`fixed top-4 right-4 z-50 border px-4 py-3 font-mono text-sm max-w-sm shadow-lg ${
          updateStatus.ok
            ? 'border-emerald-500 text-emerald-300 bg-emerald-950/90'
            : 'border-red-500 text-red-300 bg-red-950/90'
        }`}>
          <div className="flex items-start justify-between gap-3">
            <div>
              <div>{updateStatus.message}</div>
              {updateStatus.errors && (
                <div className="text-[10px] text-zinc-400 mt-1 leading-relaxed">
                  {updateStatus.errors.slice(0, 4).map((er, i) => <div key={i}>• {er}</div>)}
                  {updateStatus.errors.length > 4 && <div>… +{updateStatus.errors.length - 4} weitere</div>}
                </div>
              )}
            </div>
            <button onClick={() => setUpdateStatus(null)} className="text-zinc-500 hover:text-zinc-300 shrink-0">
              <X size={14} />
            </button>
          </div>
        </div>
      )}

      {/* HEADER */}
      <header className="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <Logo />
          <div className="flex items-center gap-2">
            <button
              onClick={handleUpdatePrices}
              disabled={updating}
              className="bg-emerald-500 hover:bg-emerald-400 disabled:opacity-60 disabled:cursor-wait text-zinc-950 font-mono text-xs px-3 py-2 transition flex items-center gap-1"
            >
              {updating
                ? <Loader2 size={14} className="animate-spin" />
                : <RefreshCw size={14} />}
              <span className="hidden sm:inline">{updating ? 'KURSE…' : 'KURSE'}</span>
            </button>
            <button
              onClick={onOpenUpload}
              className="border border-zinc-700 hover:border-emerald-500/60 text-zinc-300 hover:text-emerald-400 font-mono text-xs px-3 py-2 transition flex items-center gap-1"
            >
              <Plus size={14} />
              <span className="hidden sm:inline">MANUELL</span>
            </button>
            <button
              onClick={onOpenSettings}
              className="border border-zinc-800 hover:border-zinc-700 text-zinc-400 p-2"
            >
              <Settings size={14} />
            </button>
          </div>
        </div>

        {/* TAB BAR */}
        <div className="max-w-7xl mx-auto px-4 flex gap-1 -mb-px overflow-x-auto">
          {[
            ['overview', 'ÜBERSICHT'],
            ['crypto', 'KRYPTO'],
            ['etfs', 'ETFs'],
          ].map(([id, label]) => (
            <button
              key={id}
              onClick={() => setTab(id)}
              className={`px-3 py-2 text-xs font-mono border-b-2 transition whitespace-nowrap ${
                tab === id
                  ? 'border-emerald-400 text-emerald-400'
                  : 'border-transparent text-zinc-500 hover:text-zinc-300'
              }`}
            >
              {label}
            </button>
          ))}
        </div>
      </header>

      {/* CONTENT */}
      <main className="max-w-7xl mx-auto px-4 py-6">
        {tab === 'overview' && (
          <OverviewTab
            data={data}
            total={total}
            totalChange={totalChange}
            totalChangePct={totalChangePct}
            alloc={alloc}
            vorsorgeTotal={vorsorgeTotal}
            targetProgress={targetProgress}
          />
        )}
        {tab === 'crypto' && <CryptoTab data={data} />}
        {tab === 'etfs' && <EtfsTab data={data} />}

  );
};

      {/* Monthly Plan */}
      <div className="border border-zinc-800 bg-zinc-950/50">
        <div className="px-4 py-3 border-b border-zinc-800">
          <div className="text-[10px] uppercase tracking-widest text-zinc-500 font-mono">// MONATLICHER INVESTMENT-PLAN</div>
        </div>
        <table className="w-full text-sm font-mono">
          <tbody>
            {monthlyPlan.map(m => (
              <tr key={m.asset} className="border-b border-zinc-900">
                <td className="px-4 py-2 text-zinc-200">{m.asset}</td>
                <td className="px-4 py-2 text-right text-zinc-400">{fmt(m.amount)} CHF</td>
                <td className="px-4 py-2 text-right text-xs text-zinc-500">{m.platform}</td>
              </tr>
            ))}
            <tr className="bg-zinc-900/40">
              <td className="px-4 py-2 text-emerald-400 font-bold">TOTAL</td>
              <td className="px-4 py-2 text-right text-emerald-400 font-bold">{fmt(total)} CHF</td>
              <td className="px-4 py-2"></td>
            </tr>
          </tbody>
        </table>

      {/* Todos */}
      <div className="border border-zinc-800 bg-zinc-950/50">
        <div className="px-4 py-3 border-b border-zinc-800">
          <div className="text-[10px] uppercase tracking-widest text-zinc-500 font-mono">// TODOs</div>
        </div>
        <div className="divide-y divide-zinc-900">
          {sortedTodos.map(t => (
            <div
              key={t.id}
              onClick={() => toggleTodo(t.id)}
              className="px-4 py-2 flex items-center gap-3 cursor-pointer hover:bg-zinc-900/40 text-sm"
            >
              <div className={`w-4 h-4 border ${t.done ? 'bg-emerald-500 border-emerald-500' : 'border-zinc-600'} flex items-center justify-center shrink-0`}>
                {t.done && <Check size={10} className="text-zinc-950" />}
              </div>
              <div className={`flex-1 font-mono text-xs ${t.done ? 'text-zinc-600 line-through' : 'text-zinc-200'}`}>
                {t.text}
              </div>
              <div className={`text-[10px] uppercase font-mono px-2 py-0.5 ${
                t.priority === 'high' ? 'text-red-400 border border-red-500/30' :
                t.priority === 'medium' ? 'text-amber-400 border border-amber-500/30' :

      </div>
    </div>
  );
};

const SettingsModal = ({ open, onClose, data, onUpdate, apiKey, onApiKeyChange }) => {
  const [editKey, setEditKey] = useState(apiKey || '');
  const [showKey, setShowKey] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);

  useEffect(() => { setEditKey(apiKey || ''); }, [apiKey, open]);

  const runApiTest = async () => {
    setTesting(true);
    setTestResult(null);
    const log = [];
    try {
      log.push(`Provider: Claude via Worker (${CLAUDE_MODEL})`);
      log.push(`Endpoint: ${CLAUDE_WORKER_URL}`);
      log.push(`Sende minimalen Test-Request...`);

      let response;
      try {
        response = await fetch(CLAUDE_WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: CLAUDE_MODEL,
            max_tokens: 16,
            messages: [{ role: 'user', content: 'Reply with exactly: PONG' }],
          }),
        });
      } catch (e) {
        log.push(`❌ FETCH-Fehler: ${e.name}: ${e.message}`);
        log.push(`→ Mögliche Ursache: Worker nicht erreichbar oder CORS. URL prüfen.`);
        setTestResult({ ok: false, log: log.join('\n') });
        setTesting(false);
        return;
      }

      log.push(`HTTP Status: ${response.status}`);
      const raw = await response.text();
      log.push(`Response Länge: ${raw.length} Zeichen`);
      log.push(`Response Preview: ${raw.slice(0, 300)}`);

      if (response.ok) {
        log.push(`✓ API erreichbar`);
        setTestResult({ ok: true, log: log.join('\n') });
      } else {
        setTestResult({ ok: false, log: log.join('\n') });
      }
    } catch (e) {
      log.push(`Outer error: ${e.message}`);
      setTestResult({ ok: false, log: log.join('\n') });
    } finally {
      setTesting(false);
    }
  };

  if (!open) return null;

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `portfolio-${fmtDate(data.meta.lastUpdate).replace(/\./g, '-')}.json`;
    a.click();
  };

  const handleImport = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        onUpdate(imported);
        onClose();
      } catch {
        alert('Datei konnte nicht gelesen werden');
      }
    };
    reader.readAsText(f);
  };

  const handleReset = () => {
    if (confirm('Wirklich alle Daten löschen und auf Mai-2026-Stand zurücksetzen?')) {
      onUpdate(SEED_DATA);
      onClose();
    }
  };

  return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
      <div className="bg-zinc-950 border border-zinc-800 max-w-md w-full max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between border-b border-zinc-800 p-4">
          <div className="font-mono text-sm text-emerald-400">// SETTINGS</div>
          <button onClick={onClose} className="text-zinc-500 hover:text-zinc-300">
            <X size={18} />
          </button>
        </div>

        <div className="p-6 space-y-6">
          <div>
            <div className="text-xs font-mono text-zinc-400 mb-2">KI-Provider</div>
            <div className="bg-zinc-950 border border-zinc-800 px-3 py-2 text-xs font-mono text-zinc-300 space-y-1">
              <div>Modell: <span className="text-emerald-400">{CLAUDE_MODEL}</span></div>
              <div className="break-all">Worker: <span className="text-zinc-400">{CLAUDE_WORKER_URL}</span></div>
            </div>
            <div className="mt-2 text-[10px] font-mono text-zinc-500">
              ⓘ API-Key liegt serverseitig im Cloudflare Worker – im Browser ist kein Key nötig.
            </div>
          </div>

          <div>
            <div className="text-xs font-mono text-zinc-400 mb-2">API-Diagnose</div>
            <button
              onClick={runApiTest}
              disabled={testing}
              className="w-full border border-zinc-800 hover:border-emerald-500/50 text-zinc-300 font-mono text-xs py-2 flex items-center justify-center gap-2"
            >
              {testing ? <Loader2 className="animate-spin" size={14} /> : null}
              {testing ? 'TESTE...' : 'API-VERBINDUNG TESTEN'}
            </button>
            {testResult && (
              <div className={`mt-2 p-2 border text-[10px] font-mono whitespace-pre-wrap break-words max-h-64 overflow-auto ${
                testResult.ok ? 'border-emerald-500/30 text-emerald-300 bg-emerald-500/5' : 'border-red-500/30 text-red-300 bg-red-500/5'
              }`}>
                {testResult.log}
                <button
                  onClick={() => navigator.clipboard?.writeText(testResult.log)}
                  className="block mt-2 text-zinc-500 hover:text-zinc-300"
                >
                  → Kopieren
                </button>
              </div>
            )}
          </div>

          <div className="border-t border-zinc-800 pt-6">
            <div className="text-xs font-mono text-zinc-400 mb-2">Daten</div>
            <div className="space-y-2">
              <button
                onClick={handleExport}
                className="w-full border border-zinc-800 hover:border-zinc-700 text-zinc-300 font-mono text-xs py-2 flex items-center justify-center gap-2"
              >
                <Download size={14} /> JSON EXPORTIEREN
              </button>
              <label className="block">
                <span className="w-full border border-zinc-800 hover:border-zinc-700 text-zinc-300 font-mono text-xs py-2 flex items-center justify-center gap-2 cursor-pointer">
                  <Upload size={14} /> JSON IMPORTIEREN
                </span>
                <input type="file" accept=".json" onChange={handleImport} className="hidden" />
              </label>
              <button
                onClick={handleReset}
                className="w-full border border-red-500/30 text-red-400 hover:bg-red-500/10 font-mono text-xs py-2 flex items-center justify-center gap-2"
              >
                <Trash2 size={14} /> ZURÜCKSETZEN AUF SEED
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// ROOT APP
// ============================================================
function App() {
  const [data, setData] = useState(null);
  const [apiKey, setApiKey] = useState(null);
  const [setupDone, setSetupDone] = useState(false);
  const [uploadOpen, setUploadOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [booted, setBooted] = useState(false);

  // Data migration: convert old structure to new with holdings
  const migrateData = (data) => {
    if (!data || !data.positions) return data;

    // Normalize ETF tickers: extract base ticker (before ISIN/other qualifiers)
    const normalizeEtfTicker = (ticker) => {
      // Remove ISIN patterns like (IE00BF4RFH31) or [IE00BF4RFH31]
      return ticker.replace(/\s*[\(\[]IE[A-Z0-9]+[\)\]]\s*/g, '').trim();
    };

    const migrated = { ...data, positions: { ...data.positions } };

    // Move German ETFs as holdings into etfDE
    const germanETFPatterns = /^(ISHSIV|ISHSII|ISHSIII|SUSW|SUSM|IUSN)/;
    const etfHoldings = [];
    const keysToDelete = [];

    Object.entries(migrated.positions).forEach(([key, p]) => {
      if (germanETFPatterns.test(p.asset)) {
        etfHoldings.push({
          ticker: p.asset,
          wertCHF: p.wertCHF,
          plPct: p.plPct,
        });
        keysToDelete.push(key);
      }
    });

    // Update etfDE with holdings (merge with existing)
    if (migrated.positions.etfDE) {
      if (!migrated.positions.etfDE.holdings) {
        migrated.positions.etfDE.holdings = [];
      }
      // Merge: add new holdings if not already present (check normalized tickers)
      etfHoldings.forEach(newH => {
        const normalizedNew = normalizeEtfTicker(newH.ticker);
        const exists = migrated.positions.etfDE.holdings.some(h => normalizeEtfTicker(h.ticker) === normalizedNew);
        if (!exists) {
          migrated.positions.etfDE.holdings.push(newH);
        }
      });
    }

    // Delete old keys
    keysToDelete.forEach(key => {
      delete migrated.positions[key];
      // Also delete history for these keys
      if (migrated.history && migrated.history[key]) {
        delete migrated.history[key];
      }
    });

    // Deduplicate ALL ETF holdings (in case they were imported with variants like with/without ISIN)
    try {
      if (migrated.positions.etfDE && migrated.positions.etfDE.holdings && Array.isArray(migrated.positions.etfDE.holdings)) {
        const holdingsByNormalized = {};
        migrated.positions.etfDE.holdings.forEach(h => {
          if (!h || !h.ticker) return;
          const normalized = normalizeEtfTicker(h.ticker);
          if (!holdingsByNormalized[normalized]) {
            holdingsByNormalized[normalized] = { ticker: h.ticker, wertCHF: 0, plPct: 0, count: 0 };
          }
          holdingsByNormalized[normalized].wertCHF += h.wertCHF || 0;
          holdingsByNormalized[normalized].plPct += h.plPct || 0;
          holdingsByNormalized[normalized].count += 1;
        });

        const deduped = Object.values(holdingsByNormalized);
        if (deduped.length > 0 && deduped.length < migrated.positions.etfDE.holdings.length) {
          // Only update if we actually removed duplicates
          migrated.positions.etfDE.holdings = deduped.map(h => ({
            ticker: h.ticker,
            wertCHF: h.wertCHF,
            plPct: h.count > 0 ? h.plPct / h.count : 0,
          }));

          // Recalculate etfDE totals after dedup
          migrated.positions.etfDE.wertCHF = migrated.positions.etfDE.holdings.reduce((sum, h) => sum + h.wertCHF, 0);
          const totalWert = migrated.positions.etfDE.wertCHF;
          migrated.positions.etfDE.plPct = totalWert > 0
            ? migrated.positions.etfDE.holdings.reduce((sum, h) => sum + (h.plPct * h.wertCHF), 0) / totalWert
            : 0;
        }
      }
    } catch (e) {
      // Silently fail dedup, continue with migration
    }

    // Recalculate history.total after migration
    if (migrated.history && migrated.history.total) {
      const newTotal = Object.keys(migrated.positions).reduce((sum, key) => {
        return sum + (migrated.positions[key].wertCHF || 0);
      }, 0);
      // Reset history.total with only the current value to avoid confusion
      migrated.history.total = [{ date: new Date().toISOString().slice(0, 10), wertCHF: newTotal }];
    }

    return migrated;
  };

  // Helper: deduplicate ETF holdings by normalized ticker
  const deduplicateData = (data) => {
    if (!data || !data.positions || !data.positions.etfDE || !Array.isArray(data.positions.etfDE.holdings)) return data;

    const normalizeEtfTicker = (ticker) => {
      return ticker.replace(/\s*[\(\[]IE[A-Z0-9]+[\)\]]\s*/g, '').trim();
    };

    const holdings = data.positions.etfDE.holdings;
    const holdingsByNormalized = {};

    holdings.forEach(h => {
      if (!h || !h.ticker) return;
      const normalized = normalizeEtfTicker(h.ticker);
      if (!holdingsByNormalized[normalized]) {
        holdingsByNormalized[normalized] = { ticker: h.ticker, wertCHF: 0, plPct: 0, count: 0 };
      }
      holdingsByNormalized[normalized].wertCHF += h.wertCHF || 0;
      holdingsByNormalized[normalized].plPct += h.plPct || 0;
      holdingsByNormalized[normalized].count += 1;
    });

    const deduped = Object.values(holdingsByNormalized);

    // Only create new object if we actually removed duplicates
    if (deduped.length < holdings.length) {
      const newData = JSON.parse(JSON.stringify(data)); // Deep clone

      newData.positions.etfDE.holdings = deduped.map(h => ({
        ticker: h.ticker,
        wertCHF: h.wertCHF,
        plPct: h.count > 0 ? h.plPct / h.count : 0,
      }));

      // Recalculate totals
      newData.positions.etfDE.wertCHF = newData.positions.etfDE.holdings.reduce((sum, h) => sum + h.wertCHF, 0);
      const totalWert = newData.positions.etfDE.wertCHF;
      newData.positions.etfDE.plPct = totalWert > 0
        ? newData.positions.etfDE.holdings.reduce((sum, h) => sum + (h.plPct * h.wertCHF), 0) / totalWert
        : 0;

      return newData;
    }

    return data;
  };

  // Initial load: versuche von Cloudflare zu laden, fallback zu localStorage
  useEffect(() => {
    (async () => {
      const key = loadApiKey();
      if (key) setApiKey(key);

      // Zuerst Cloudflare versuchen
      const cloudflareData = await loadFromCloudflare();
      if (cloudflareData) {
        const migratedData = migrateData(cloudflareData);
        const deduped = deduplicateData(migratedData);
        setData(deduped);
        // Save deduplicated data immediately
        saveData(deduped);
        setSetupDone(true);
        setBooted(true);
        return;
      }

      // Fallback: localStorage
      const stored = loadData();
      if (stored) {
        const migratedData = migrateData(stored);
        const deduped = deduplicateData(migratedData);
        setData(deduped);
        // Save deduplicated data immediately
        saveData(deduped);
        setSetupDone(true);
      } else {
        setData(SEED_DATA);
      }
      setBooted(true);
    })();
  }, []);

  // Persist on change
  useEffect(() => {
    if (data && booted) {
      saveData(data);
      saveToCloudflare(data);
    }
  }, [data, booted]);

  const handleSetupComplete = () => {
    setApiKey(loadApiKey());
    if (!data) setData(SEED_DATA);
    setSetupDone(true);
  };

  const handleApiKeyChange = (newKey) => {
    saveApiKey(newKey);
    setApiKey(newKey);
  };

  // Save extracted positions
  const handleSaveExtracted = (positions, source) => {
    const newData = { ...data };
    const today = new Date().toISOString().slice(0, 10);

    positions.forEach(p => {
      if (!p.asset) return;
      const ticker = p.asset.toUpperCase().replace(/[^A-Z0-9-]/g, '');

      const keyMap = {
        'BTC': 'btc', 'ETH': 'eth', 'SOL': 'sol', 'KAS': 'kas', 'RNDR': 'rndr', 'RENDER': 'rndr',
        'V3AA': 'v3aaCH', 'VIAC': 'viac',
        'ETF-DE': 'etfDE', 'CASH': 'cash', 'NOTGROSCHEN': 'cash',
      };
      const key = keyMap[ticker];

      if (key && newData.positions[key]) {
        // Known asset – update as before
        Object.keys(p).forEach(field => {
          if (field !== 'asset' && p[field] != null) {
            newData.positions[key][field] = p[field];
          }
        });
        // Append to history
        if (!newData.history[key]) newData.history[key] = [];
        newData.history[key].push({ date: today, wertCHF: newData.positions[key].wertCHF });
      } else {
        // Unknown asset – add as holding to etfDE (or other parent if applicable)
        // Heuristic: German ETF tickers → etfDE
        const isGermanETF = ticker.match(/^(ISHSIV|ISHSII|ISHSIII|SUSW|SUSM|IUSN)/);
        const parentKey = isGermanETF ? 'etfDE' : null;

        if (parentKey && newData.positions[parentKey]) {
          if (!newData.positions[parentKey].holdings) {
            newData.positions[parentKey].holdings = [];
          }
          // Add or update holding
          const existingIdx = newData.positions[parentKey].holdings.findIndex(h => h.ticker === p.asset);
          const holding = {
            ticker: p.asset,
            wertCHF: p.wertCHF || 0,
            plPct: p.plPct || 0,
          };
          if (existingIdx >= 0) {
            newData.positions[parentKey].holdings[existingIdx] = holding;
          } else {
            newData.positions[parentKey].holdings.push(holding);
          }
          // Recompute parent wertCHF as sum of holdings
          newData.positions[parentKey].wertCHF = newData.positions[parentKey].holdings.reduce((sum, h) => sum + h.wertCHF, 0);
          // Compute average plPct weighted by wertCHF
          const totalWert = newData.positions[parentKey].wertCHF;
          newData.positions[parentKey].plPct = totalWert > 0
            ? newData.positions[parentKey].holdings.reduce((sum, h) => sum + (h.plPct * h.wertCHF), 0) / totalWert
            : 0;
        }
      }
    });

    // Recompute total history
    const newTotal = calcTotal(newData.positions);
    if (!newData.history.total) newData.history.total = [];
    newData.history.total.push({ date: today, wertCHF: newTotal });

    newData.meta.lastUpdate = today;
    setData(newData);

    // Speichere auch zu Cloudflare
    saveToCloudflare(newData);
  };

  if (!booted) {
    return <div className="min-h-screen bg-zinc-950 flex items-center justify-center"><Loader2 className="text-emerald-400 animate-spin" size={24} /></div>;
  }

  if (!setupDone) {
    return <SetupScreen onComplete={handleSetupComplete} />;
  }

  return (
    <>
      <Dashboard
        data={data}
        onUpdate={setData}
        onOpenUpload={() => setUploadOpen(true)}
        onOpenSettings={() => setSettingsOpen(true)}
      />
      <UploadModal
        open={uploadOpen}
        onClose={() => setUploadOpen(false)}
        onSave={handleSaveExtracted}
        apiKey={apiKey}
      />
      <SettingsModal
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        data={data}
        onUpdate={setData}
        apiKey={apiKey}
        onApiKeyChange={handleApiKeyChange}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
