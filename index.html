const buildSystemPrompt = (sourcePrompt) => `${sourcePrompt}\n\n${JSON_RULES}`;

const parseJsonResponse = (content) => {
  const cleaned = (content || '').replace(/```json/gi, '').replace(/```/g, '').trim();
  try { return JSON.parse(cleaned); } catch {}
  const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
  if (jsonMatch) try { return JSON.parse(jsonMatch[0]); } catch(e) { throw new Error(`JSON parse error: ${e.message}`); }
  throw new Error(`Kein JSON in Antwort: ${cleaned.slice(0, 300)}`);
};

const compressImage = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      let width = img.width, height = img.height;
      const maxDim = 1568;
      if (width > maxDim || height > maxDim) {
        if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
        else { width = Math.round((width * maxDim) / height); height = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      resolve({ base64: dataUrl.split(',')[1], mimeType: 'image/jpeg', width, height });
    };
    img.onerror = reject;
    img.src = reader.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const callClaudeProxy = async (workerUrl, modelName, systemPrompt, userContentParts) => {
  const response = await fetch(workerUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: modelName,
      system: systemPrompt,
      messages: [{ role: 'user', content: userContentParts }],
      max_tokens: 4096,
      temperature: 0,
    }),
  });
  const raw = await response.text();
  if (!response.ok) throw new Error(`Proxy-Fehler (${response.status}): ${raw.slice(0,400)}`);
  let data;
  try { data = JSON.parse(raw); } catch(e) { throw new Error(`Proxy antwortete kein JSON: ${raw.slice(0,300)}`); }
  const textBlock = data.content?.find(block => block.type === 'text');
  if (!textBlock?.text) throw new Error('Keine Textantwort vom Proxy');
  return parseJsonResponse(textBlock.text);
};

const callClaudeVisionViaProxy = async (workerUrl, modelName, { base64, mimeType }, source) => {
  const systemPrompt = buildSystemPrompt(PROMPTS_BY_SOURCE[source] || PROMPTS_BY_SOURCE.swissquote);
  return callClaudeProxy(workerUrl, modelName, systemPrompt, [
    { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } },
    { type: 'text', text: 'Extrahiere alle Positionen aus diesem Screenshot gemäss Systemanweisung. Gib nur JSON zurück.' }
  ]);
};

const callClaudeTextViaProxy = async (workerUrl, modelName, source, rawText) => {
  const systemPrompt = buildSystemPrompt(PROMPTS_BY_SOURCE[source] || PROMPTS_BY_SOURCE.swissquote);
  return callClaudeProxy(workerUrl, modelName, systemPrompt, [{ type: 'text', text: `--- DATEN ---\n${rawText}\n\nExtrahiere Positionen. Gib nur JSON.` }]);
};

          {step === 'source' && (<div><h2 className="text-lg font-mono text-zinc-100 mb-1">Quelle wählen</h2><p className="text-xs text-zinc-500 mb-4 font-mono">→ Woher kommen die Daten?</p><div className="grid grid-cols-2 gap-2">{sources.map(s => (<button key={s.id} onClick={() => { setSource(s.id); if (s.id === 'manual') handleManualEntry(); else setStep('upload'); }} className="text-left border border-zinc-800 hover:border-emerald-500/50 bg-zinc-900/50 p-3 transition group"><div className="font-mono text-sm text-zinc-100 group-hover:text-emerald-400">{s.label}</div><div className="text-xs text-zinc-500 mt-0.5">{s.desc}</div></button>))}</div></div>)}
          {step === 'upload' && (<div><h2 className="text-lg font-mono text-zinc-100 mb-1">Screenshot hochladen</h2><p className="text-xs text-zinc-500 mb-4 font-mono">→ {sources.find(s => s.id === source)?.label}</p><div onClick={() => fileInputRef.current?.click()} className="border-2 border-dashed border-zinc-800 hover:border-emerald-500/50 bg-zinc-900/30 p-12 text-center cursor-pointer transition"><Upload className="mx-auto text-zinc-600 mb-3" size={32} /><div className="text-sm text-zinc-300 font-mono">Bild auswählen</div><div className="text-xs text-zinc-500 mt-1">PNG, JPG – wird an den Claude-Proxy gesendet</div></div><input ref={fileInputRef} type="file" accept="image/*" onChange={handleFileSelect} className="hidden" /><div className="mt-4 flex items-center justify-between"><button onClick={() => setStep('source')} className="text-xs text-zinc-500 hover:text-zinc-300 font-mono">← Zurück</button><button onClick={() => setStep('paste')} className="text-xs text-emerald-400 hover:text-emerald-300 font-mono flex items-center gap-1"><FileText size={12} /> Stattdessen Text einfügen →</button></div></div>)}
          {step === 'paste' && (<div><h2 className="text-lg font-mono text-zinc-100 mb-1">Text einfügen</h2><p className="text-xs text-zinc-500 mb-4 font-mono">→ {sources.find(s => s.id === source)?.label} · kopierter Text</p><textarea value={pasteText} onChange={(e) => setPasteText(e.target.value)} rows={10} placeholder="Hier den kopierten Text einfügen..." className="w-full bg-zinc-950 border border-zinc-800 px-3 py-2 text-sm font-mono text-zinc-200 focus:border-emerald-500 focus:outline-none resize-y" /><div className="mt-4 flex items-center justify-between"><button onClick={() => setStep('upload')} className="text-xs text-zinc-500 hover:text-zinc-300 font-mono">← Zurück</button><button onClick={runPasteExtraction} className="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-mono text-xs px-4 py-2 transition">AN PROXY SENDEN →</button></div></div>)}
          {step === 'extract' && (<div className="text-center py-12">{loading && (<><Loader2 className="mx-auto text-emerald-400 animate-spin mb-4" size={32} /><div className="font-mono text-sm text-zinc-300">Verarbeite...</div><div className="text-xs text-zinc-500 mt-2">Claude analysiert, kann etwas dauern</div>{diagnosis && <div className="text-[10px] text-zinc-600 mt-3 font-mono whitespace-pre-wrap">{diagnosis}</div>}</>)}{error && (<><AlertCircle className="mx-auto text-red-400 mb-4" size={32} /><div className="font-mono text-sm text-red-400 mb-3">Fehler bei Extraktion</div><div className="text-xs text-zinc-300 font-mono bg-zinc-900 border border-zinc-800 p-3 text-left max-h-48 overflow-auto whitespace-pre-wrap break-words">{error}</div><div className="mt-4 flex flex-col gap-2 items-center"><button onClick={() => { setError(null); handleManualEntry(); }} className="text-xs text-emerald-400 hover:text-emerald-300 font-mono">→ Manuell eintragen stattdessen</button><button onClick={() => navigator.clipboard?.writeText(error)} className="text-xs text-zinc-500 hover:text-zinc-300 font-mono">Fehler kopieren</button></div></>)}</div>)}
          {step === 'review' && editedData && (<div><h2 className="text-lg font-mono text-zinc-100 mb-1">Werte prüfen & bestätigen</h2><p className="text-xs text-zinc-500 mb-4 font-mono">→ Editierbar, dann speichern</p><div className="space-y-3 mb-6">{editedData.positions.map((pos, idx) => (<div key={idx} className="border border-zinc-800 bg-zinc-900/50 p-3"><div className="grid grid-cols-2 gap-2"><Field label="Asset (Ticker)" value={pos.asset} onChange={(v) => updateField(idx, 'asset', v)} type="text" /><Field label="Menge" value={pos.menge} onChange={(v) => updateField(idx, 'menge', v)} /><Field label="Einstandspreis" value={pos.einstand} onChange={(v) => updateField(idx, 'einstand', v)} /><Field label="Aktueller Kurs" value={pos.kurs} onChange={(v) => updateField(idx, 'kurs', v)} /><Field label="Wert CHF" value={pos.wertCHF} onChange={(v) => updateField(idx, 'wertCHF', v)} /><Field label="P/L %" value={pos.plPct} onChange={(v) => updateField(idx, 'plPct', v)} /></div></div>))}</div><div className="flex gap-2"><button onClick={handleSave} className="flex-1 bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-mono text-sm py-2 transition"><Check size={14} className="inline mr-1" /> WERTE ÜBERNEHMEN</button><button onClick={onClose} className="px-4 border border-zinc-800 hover:border-zinc-700 text-zinc-400 font-mono text-sm py-2">VERWERFEN</button></div></div>)}
        </div>
      </div>
    </div>
  );
};

const Field = ({ label, value, onChange, type = 'number' }) => (
  <div><div className="text-[10px] uppercase tracking-wider text-zinc-500 font-mono mb-1">{label}</div><input type={type} step="any" value={value} onChange={(e) => onChange(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 px-2 py-1 text-sm font-mono text-zinc-200 focus:border-emerald-500 focus:outline-none" /></div>
);

        </div>

        <StatCard label="KRYPTO" value={fmtChf(alloc.crypto)} sub={`${((alloc.crypto / total) * 100).toFixed(1)}% Anteil`} />
        <StatCard label="ETFs" value={fmtChf(alloc.etf)} sub={`${((alloc.etf / total) * 100).toFixed(1)}% Anteil`} accent="zinc" />

})}</div>

    </div>
  );
};

const VorsorgeTab = ({ data, vorsorgeTotal, targetProgress }) => {
  const items = Object.entries(data.vorsorge);
  return (<div className="space-y-6"><div className="border border-zinc-800 bg-zinc-950/50 p-6"><div className="text-[10px] uppercase tracking-widest text-zinc-500 font-mono mb-2">// MONATLICHES RENTENEINKOMMEN</div><div className="flex items-end gap-4 flex-wrap"><div className="text-4xl font-mono text-emerald-400">{fmt(vorsorgeTotal)} <span className="text-xl text-zinc-500">CHF/Mo</span></div><div className="text-sm font-mono text-zinc-400">Ziel war {fmt(data.meta.targetMonthlyRetirement)} CHF → <span className="text-emerald-400">{Math.round(targetProgress)}% erreicht</span></div></div><div className="mt-6 space-y-3">{items.map(([k, v]) => { const pct = (v.monthly / vorsorgeTotal) * 100; return (<div key={k}><div className="flex justify-between text-xs font-mono mb-1"><span className="text-zinc-300">{v.label}</span><span className="text-zinc-400">{fmt(v.monthly)} CHF/Mo</span></div><div className="h-2 bg-zinc-900"><div className="h-full bg-emerald-500/70" style={{ width: `${pct}%` }} /></div></div>); })}</div></div><div className="border border-amber-500/30 bg-amber-500/5 p-4"><div className="flex items-start gap-3"><AlertCircle className="text-amber-400 shrink-0 mt-0.5" size={18} /><div><div className="font-mono text-sm text-amber-400">PKZH-EINKAUFSLÜCKE PRÜFEN</div><div className="text-xs text-zinc-400 mt-1">Pro 10.000 CHF PK-Einkauf: ~3.500 CHF Steuer gespart. Zehntausende CHF Potenzial.</div><div className="mt-2 text-xs font-mono flex flex-wrap gap-3"><a href="tel:+41444155700" className="text-emerald-400 hover:text-emerald-300">📞 044 415 57 00</a><a href="mailto:info@pkzh.ch" className="text-emerald-400 hover:text-emerald-300">✉ info@pkzh.ch</a><a href="https://pkzh.ch" target="_blank" rel="noreferrer" className="text-emerald-400 hover:text-emerald-300">🌐 pkzh.ch</a></div></div></div></div></div>);

const EtfsTab = ({ data }) => {
  const etfKeys = Object.keys(data.positions).filter(k => data.positions[k].category === 'etf');
  return (<div className="grid md:grid-cols-2 gap-4">{etfKeys.map(k => { const p = data.positions[k]; return (<div key={k} className="border border-zinc-800 bg-zinc-950/50 p-4"><div className="text-xs text-zinc-500 font-mono">{p.platform}</div><div className="text-xl font-mono text-zinc-100 mt-0.5">{p.label}</div><div className="text-3xl font-mono text-zinc-200 mt-3">{fmt(p.wertCHF)} <span className="text-base text-zinc-500">CHF</span></div><div className={`text-xs font-mono mt-1 ${p.plPct > 0 ? 'text-emerald-400' : 'text-zinc-500'}`}>{p.plPct ? fmtPct(p.plPct) : '–'}</div></div>); })}</div>);
};

const PlanTab = ({ data, onUpdate }) => {
  const toggleTodo = (id) => { const newData = { ...data }; newData.todos = data.todos.map(t => t.id === id ? { ...t, done: !t.done } : t); onUpdate(newData); };
  const monthlyPlan = [{ asset: 'V3AA Sparplan', amount: 1000, platform: 'Swissquote' }, { asset: 'BTC DCA', amount: 300, platform: 'Relai' }, { asset: 'SOL DCA', amount: 250, platform: 'Swissquote' }, { asset: 'RNDR DCA', amount: 50, platform: 'Kraken' }];
  const total = monthlyPlan.reduce((s, x) => s + x.amount, 0);
  const sortedTodos = [...data.todos].sort((a, b) => { if (a.done !== b.done) return a.done ? 1 : -1; const prio = { high: 0, medium: 1, low: 2 }; return prio[a.priority] - prio[b.priority]; });
  return (<div className="space-y-6"><div className="border border-zinc-800 bg-zinc-950/50"><div className="px-4 py-3 border-b border-zinc-800"><div className="text-[10px] uppercase tracking-widest text-zinc-500 font-mono">// MONATLICHER INVESTMENT-PLAN</div></div><table className="w-full text-sm font-mono"><tbody>{monthlyPlan.map(m => (<tr key={m.asset} className="border-b border-zinc-900"><td className="px-4 py-2 text-zinc-200">{m.asset}</td><td className="px-4 py-2 text-right text-zinc-400">{fmt(m.amount)} CHF</td><td className="px-4 py-2 text-right text-xs text-zinc-500">{m.platform}</td></tr>))}<tr className="bg-zinc-900/40"><td className="px-4 py-2 text-emerald-400 font-bold">TOTAL</td><td className="px-4 py-2 text-right text-emerald-400 font-bold">{fmt(total)} CHF</td><td className="px-4 py-2"></td></tr></tbody></table></div><div className="border border-zinc-800 bg-zinc-950/50"><div className="px-4 py-3 border-b border-zinc-800"><div className="text-[10px] uppercase tracking-widest text-zinc-500 font-mono">// TODOs</div></div><div className="divide-y divide-zinc-900">{sortedTodos.map(t => (<div key={t.id} onClick={() => toggleTodo(t.id)} className="px-4 py-2 flex items-center gap-3 cursor-pointer hover:bg-zinc-900/40 text-sm"><div className={`w-4 h-4 border ${t.done ? 'bg-emerald-500 border-emerald-500' : 'border-zinc-600'} flex items-center justify-center shrink-0`}>{t.done && <Check size={10} className="text-zinc-950" />}</div><div className={`flex-1 font-mono text-xs ${t.done ? 'text-zinc-600 line-through' : 'text-zinc-200'}`}>{t.text}</div><div className={`text-[10px] uppercase font-mono px-2 py-0.5 ${t.priority === 'high' ? 'text-red-400 border border-red-500/30' : t.priority === 'medium' ? 'text-amber-400 border border-amber-500/30' : 'text-zinc-500 border border-zinc-700'}`}>{t.priority}</div></div>))}</div></div></div>);
};

const Dashboard = ({ data, onUpdate, onOpenUpload, onOpenSettings }) => {
  const [tab, setTab] = useState('overview');
  const total = calcTotal(data.positions);
  const alloc = calcAllocation(data.positions);
  const totalHistory = data.history.total || [];
  const prevTotal = totalHistory.length > 1 ? totalHistory[totalHistory.length - 2].wertCHF : total;
  const totalChange = total - prevTotal;
  const totalChangePct = prevTotal ? (totalChange / prevTotal) * 100 : 0;
  const vorsorgeTotal = Object.values(data.vorsorge).reduce((s, v) => s + v.monthly, 0);
  const targetProgress = (vorsorgeTotal / data.meta.targetMonthlyRetirement) * 100;
  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-200">
      <header className="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-40"><div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between"><Logo /><div className="flex items-center gap-2"><button onClick={onOpenUpload} className="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-mono text-xs px-3 py-2 transition flex items-center gap-1"><Plus size={14} />UPDATE</button><button onClick={onOpenSettings} className="border border-zinc-800 hover:border-zinc-700 text-zinc-400 p-2"><Settings size={14} /></button></div></div><div className="max-w-7xl mx-auto px-4 flex gap-1 -mb-px overflow-x-auto">{['overview','crypto','vorsorge','etfs','plan'].map(id => (<button key={id} onClick={() => setTab(id)} className={`px-3 py-2 text-xs font-mono border-b-2 transition whitespace-nowrap ${tab === id ? 'border-emerald-400 text-emerald-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}>{id === 'overview' ? 'ÜBERSICHT' : id === 'crypto' ? 'KRYPTO' : id === 'vorsorge' ? 'VORSORGE' : id === 'etfs' ? 'ETFs' : 'PLAN & TODOS'}</button>))}</div></header>
      <main className="max-w-7xl mx-auto px-4 py-6">
        {tab === 'overview' && <OverviewTab data={data} total={total} totalChange={totalChange} totalChangePct={totalChangePct} alloc={alloc} vorsorgeTotal={vorsorgeTotal} targetProgress={targetProgress} />}
        {tab === 'crypto' && <CryptoTab data={data} />}
        {tab === 'vorsorge' && <VorsorgeTab data={data} vorsorgeTotal={vorsorgeTotal} targetProgress={targetProgress} />}
        {tab === 'etfs' && <EtfsTab data={data} />}
        {tab === 'plan' && <PlanTab data={data} onUpdate={onUpdate} />}
      </main>
    </div>
  );
};

const SettingsModal = ({ open, onClose, data, onUpdate, workerUrl, onWorkerUrlChange, modelName, onModelNameChange }) => {
  const [editUrl, setEditUrl] = useState(workerUrl || DEFAULT_WORKER_URL);
  const [showUrl, setShowUrl] = useState(false);
  const [editModel, setEditModel] = useState(modelName || DEFAULT_MODEL);
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);
  useEffect(() => { setEditUrl(workerUrl || DEFAULT_WORKER_URL); setEditModel(modelName || DEFAULT_MODEL); }, [workerUrl, modelName, open]);
  const runProxyTest = async () => {
    setTesting(true); setTestResult(null);
    const log = [];
    try {
      if (!editUrl) throw new Error('Keine Worker-URL eingegeben.');
      log.push(`Teste Proxy: ${editUrl} mit Modell ${editModel}`);
      const response = await fetch(editUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: editModel,
          system: 'Antworte mit PONG',
          messages: [{ role: 'user', content: [{ type: 'text', text: 'PONG' }] }],
          max_tokens: 10,
        }),
      });
      log.push(`HTTP Status: ${response.status}`);
      const raw = await response.text();
      log.push(`Antwort: ${raw.slice(0,300)}`);
      if (response.ok) log.push(`✓ Proxy antwortet korrekt.`);
      else log.push(`❌ Proxy-Fehler: ${raw.slice(0,200)}`);
      setTestResult({ ok: response.ok, log: log.join('\n') });
    } catch (e) { log.push(`❌ Fehler: ${e.message}`); setTestResult({ ok: false, log: log.join('\n') }); }
    finally { setTesting(false); }
  };
  if (!open) return null;
  const handleExport = () => { const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `portfolio-${data.meta.lastUpdate}.json`; a.click(); };
  const handleImport = (e) => { const f = e.target.files?.[0]; if (!f) return; const reader = new FileReader(); reader.onload = (ev) => { try { const imported = JSON.parse(ev.target.result); onUpdate(imported); onClose(); } catch { alert('Datei konnte nicht gelesen werden'); } }; reader.readAsText(f); };
  const handleReset = () => { if (confirm('Wirklich alle Daten löschen und auf Mai-2026-Stand zurücksetzen?')) { onUpdate(SEED_DATA); onClose(); } };
  return (<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4"><div className="bg-zinc-950 border border-zinc-800 max-w-md w-full max-h-[90vh] overflow-y-auto"><div className="flex items-center justify-between border-b border-zinc-800 p-4"><div className="font-mono text-sm text-emerald-400">// SETTINGS</div><button onClick={onClose} className="text-zinc-500 hover:text-zinc-300"><X size={18} /></button></div><div className="p-6 space-y-6"><div><div className="text-xs font-mono text-zinc-400 mb-2">Claude Proxy-URL</div><div className="relative"><input type={showUrl ? 'text' : 'password'} value={editUrl} onChange={(e) => setEditUrl(e.target.value)} placeholder="https://dein-worker.workers.dev" className="w-full bg-zinc-950 border border-zinc-800 px-3 py-2 pr-10 text-sm font-mono text-zinc-200 focus:border-emerald-500 focus:outline-none" /><button onClick={() => setShowUrl(!showUrl)} className="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-500">{showUrl ? <EyeOff size={16} /> : <Eye size={16} />}</button></div><button onClick={() => onWorkerUrlChange(editUrl)} className="mt-2 text-xs font-mono text-emerald-400 hover:text-emerald-300">→ Speichern</button></div><div><div className="text-xs font-mono text-zinc-400 mb-2">Claude Modell</div><input type="text" value={editModel} onChange={(e) => setEditModel(e.target.value)} placeholder="z.B. claude-haiku-4-5-20251001" className="w-full bg-zinc-950 border border-zinc-800 px-3 py-2 text-sm font-mono text-zinc-200 focus:border-emerald-500 focus:outline-none" /><button onClick={() => onModelNameChange(editModel)} className="mt-2 text-xs font-mono text-emerald-400 hover:text-emerald-300">→ Speichern</button><p className="text-[10px] text-zinc-500 mt-1">Aktuelle Modelle: claude-haiku-4-5-20251001, claude-3-7-sonnet-20250219, claude-3-5-sonnet-20241022</p></div><div><div className="text-xs font-mono text-zinc-400 mb-2">Proxy-Diagnose</div><button onClick={runProxyTest} disabled={testing} className="w-full border border-zinc-800 hover:border-emerald-500/50 text-zinc-300 font-mono text-xs py-2 flex items-center justify-center gap-2">{testing ? <Loader2 className="animate-spin" size={14} /> : null}{testing ? 'TESTE...' : 'PROXY-VERBINDUNG TESTEN'}</button>{testResult && (<div className={`mt-2 p-2 border text-[10px] font-mono whitespace-pre-wrap break-words max-h-64 overflow-auto ${testResult.ok ? 'border-emerald-500/30 text-emerald-300 bg-emerald-500/5' : 'border-red-500/30 text-red-300 bg-red-500/5'}`}>{testResult.log}<button onClick={() => navigator.clipboard?.writeText(testResult.log)} className="block mt-2 text-zinc-500 hover:text-zinc-300">→ Kopieren</button></div>)}</div><div className="border-t border-zinc-800 pt-6"><div className="text-xs font-mono text-zinc-400 mb-2">Daten</div><div className="space-y-2"><button onClick={handleExport} className="w-full border border-zinc-800 hover:border-zinc-700 text-zinc-300 font-mono text-xs py-2 flex items-center justify-center gap-2"><Download size={14} /> JSON EXPORTIEREN</button><label className="block"><span className="w-full border border-zinc-800 hover:border-zinc-700 text-zinc-300 font-mono text-xs py-2 flex items-center justify-center gap-2 cursor-pointer"><Upload size={14} /> JSON IMPORTIEREN</span><input type="file" accept=".json" onChange={handleImport} className="hidden" /></label><button onClick={handleReset} className="w-full border border-red-500/30 text-red-400 hover:bg-red-500/10 font-mono text-xs py-2 flex items-center justify-center gap-2"><Trash2 size={14} /> ZURÜCKSETZEN AUF SEED</button></div></div></div></div></div>);
};

// ============================================================
// APP (ohne Setup-Bildschirm)
// ============================================================
function App() {
  const [data, setData] = useState(null);
  const [workerUrl, setWorkerUrl] = useState(DEFAULT_WORKER_URL);
  const [modelName, setModelName] = useState(DEFAULT_MODEL);
  const [uploadOpen, setUploadOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [booted, setBooted] = useState(false);

  useEffect(() => {
    const stored = loadData();
    const url = loadWorkerUrl();
    const model = loadModelName();
    if (stored) setData(stored);
    else setData(SEED_DATA);
    if (url) setWorkerUrl(url);
    if (model) setModelName(model);
    setBooted(true);
  }, []);

  useEffect(() => {
    if (data && booted) saveData(data);
  }, [data, booted]);

  const handleWorkerUrlChange = (newUrl) => { saveWorkerUrl(newUrl); setWorkerUrl(newUrl); };
  const handleModelNameChange = (newModel) => { saveModelName(newModel); setModelName(newModel); };

  const handleSaveExtracted = (positions, source) => {
    const newData = { ...data };
    const today = new Date().toISOString().slice(0,10);
    positions.forEach(p => {
      if (!p.asset) return;
      const ticker = p.asset.toUpperCase().replace(/[^A-Z0-9-]/g, '');
      const keyMap = { 'BTC':'btc','ETH':'eth','SOL':'sol','KAS':'kas','RNDR':'rndr','RENDER':'rndr','V3AA':'v3aaCH','VIAC':'viac','ETF-DE':'etfDE','CASH':'cash' };
      const key = keyMap[ticker];
      if (key && newData.positions[key]) {
        Object.keys(p).forEach(field => {
          if (field !== 'asset' && p[field] != null) newData.positions[key][field] = p[field];
        });
        if (!newData.history[key]) newData.history[key] = [];
        newData.history[key].push({ date: today, wertCHF: newData.positions[key].wertCHF });
      }
    });
    const newTotal = calcTotal(newData.positions);
    if (!newData.history.total) newData.history.total = [];
    newData.history.total.push({ date: today, wertCHF: newTotal });
    newData.meta.lastUpdate = today;
    setData(newData);
  };

  if (!booted) return <div className="min-h-screen bg-zinc-950 flex items-center justify-center"><Loader2 className="text-emerald-400 animate-spin" size={24} /></div>;

  return (
    <>
      <Dashboard
        data={data}
        onUpdate={setData}
        onOpenUpload={() => setUploadOpen(true)}
        onOpenSettings={() => setSettingsOpen(true)}
      />
      <UploadModal
        open={uploadOpen}
        onClose={() => setUploadOpen(false)}
        onSave={handleSaveExtracted}
        workerUrl={workerUrl}
        modelName={modelName}
      />
      <SettingsModal
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        data={data}
        onUpdate={setData}
        workerUrl={workerUrl}
        onWorkerUrlChange={handleWorkerUrlChange}
        modelName={modelName}
        onModelNameChange={handleModelNameChange}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
