const compressImage = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      let width = img.width, height = img.height;
      const maxDim = 1568;
      if (width > maxDim || height > maxDim) {
        if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
        else { width = Math.round((width * maxDim) / height); height = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      resolve({ base64: dataUrl.split(',')[1], mimeType: 'image/jpeg' });
    };
    img.onerror = reject;
    img.src = reader.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const callClaudeProxy = async (workerUrl, modelName, systemPrompt, userContentParts, timeoutMs = 30000) => {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const response = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelName,
        system: systemPrompt,
        messages: [{ role: 'user', content: userContentParts }],
        max_tokens: 4096,
        temperature: 0,
      }),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);
    const raw = await response.text();
    if (!response.ok) throw new Error(`Proxy-Fehler (${response.status}): ${raw.slice(0,400)}`);
    let data;
    try { data = JSON.parse(raw); } catch(e) { throw new Error(`Proxy antwortete kein JSON: ${raw.slice(0,300)}`); }
    const textBlock = data.content?.find(block => block.type === 'text');
    if (!textBlock?.text) throw new Error('Keine Textantwort vom Proxy');
    const cleaned = textBlock.text.replace(/```json/gi, '').replace(/```/g, '').trim();
    try { return JSON.parse(cleaned); } catch(e) { throw new Error(`JSON-Parse-Fehler: ${cleaned.slice(0,300)}`); }
  } catch (e) {
    clearTimeout(timeoutId);
    throw e;
  }
};

const callClaudeVisionViaProxy = async (workerUrl, modelName, eurRate, { base64, mimeType }) => {

const fmt = (n, decimals = 0) => n == null || isNaN(n) ? '–' : new Intl.NumberFormat('de-CH', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(n);
const fmtChf = (n) => `${fmt(n, 0)} CHF`;
const fmtPct = (n) => `${n > 0 ? '+' : ''}${fmt(n, 2)}%`;

const calcAllocation = (positions) => {
  const cats = { crypto: 0, etf: 0, cash: 0 };
  Object.values(positions).forEach(p => { if (cats[p.category] !== undefined) cats[p.category] += p.wertCHF || 0; });
  return cats;
};

// Verbesserte Merge-Funktion mit korrektem plPct & Einstand
const mergeMultiplePositionLists = (allPositionsArrays) => {
  const mergedMap = new Map();
  for (const positionArray of allPositionsArrays) {
    for (const pos of positionArray) {
      const asset = pos.asset;
      if (!asset) continue;
      if (!mergedMap.has(asset)) {
        mergedMap.set(asset, { ...pos });
      } else {
        const existing = mergedMap.get(asset);
        const newMenge = existing.menge + (pos.menge || 0);
        const newWert = existing.wertCHF + (pos.wertCHF || 0);
        const newEinstand = newMenge > 0 ? newWert / newMenge : 0;
        const newKurs = newMenge > 0 ? ((existing.kurs * existing.menge) + (pos.kurs || 0) * (pos.menge || 0)) / newMenge : 0;
        const newPlPct = newEinstand > 0 ? ((newKurs - newEinstand) / newEinstand) * 100 : 0;
        mergedMap.set(asset, {
          asset: asset,
          menge: newMenge,
          wertCHF: newWert,
          einstand: newEinstand,
          kurs: newKurs,
          plPct: newPlPct,
        });
      }
    }
  }
  return Array.from(mergedMap.values());
};

const UploadModal = ({ open, onClose, onSave, workerUrl, modelName, eurRate }) => {
  const [mode, setMode] = useState(null);
  const [pasteText, setPasteText] = useState('');
  const [editedData, setEditedData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [diagnosis, setDiagnosis] = useState('');
  const [batchMode, setBatchMode] = useState(false);
  const [batchProgress, setBatchProgress] = useState({ current: 0, total: 0, currentFile: '' });
  const fileInputRef = useRef(null);

  useEffect(() => {
    if (!open) {
      setMode(null); setPasteText(''); setEditedData(null); setError(null); setDiagnosis(''); setBatchMode(false); setBatchProgress({ current: 0, total: 0, currentFile: '' });
    }
  }, [open]);

  const extractSingleFile = async (file) => {
    setDiagnosis(`Komprimiere ${file.name}...`);
    const img = await compressImage(file);
    setDiagnosis(`Sende ${file.name} an Claude (EUR-CHF ${eurRate})...`);
    const result = await callClaudeVisionViaProxy(workerUrl, modelName, eurRate, img);
    const positions = Array.isArray(result?.positions) ? result.positions : [];
    if (positions.length === 0) throw new Error(`Keine Positionen in ${file.name} erkannt.`);
    return positions;
  };

  const runSingleExtraction = async (file) => {
    setLoading(true); setError(null);
    try { const positions = await extractSingleFile(file); setEditedData({ positions }); setMode('review'); } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const runBatchExtraction = async (files) => {
    setLoading(true); setError(null);
    const allPositionsArrays = []; const errors = [];
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      setBatchProgress({ current: i+1, total: files.length, currentFile: file.name });
      try { const positions = await extractSingleFile(file); allPositionsArrays.push(positions); }
      catch (err) { errors.push(`${file.name}: ${err.message}`); }
    }
    if (allPositionsArrays.length === 0) { setError('Keine Datei konnte extrahiert werden.'); setLoading(false); return; }
    const merged = mergeMultiplePositionLists(allPositionsArrays);
    if (errors.length) alert('Fehler bei:\n' + errors.join('\n'));
    setEditedData({ positions: merged }); setMode('review'); setLoading(false);
  };

  const runPasteExtraction = async () => {
    setLoading(true); setError(null);
    try {
      if (!pasteText.trim()) throw new Error('Kein Text eingegeben.');
      const result = await callClaudeTextViaProxy(workerUrl, modelName, eurRate, pasteText);
      const positions = Array.isArray(result?.positions) ? result.positions : [];
      if (positions.length === 0) throw new Error('Keine Positionen erkannt.');
      setEditedData({ positions }); setMode('review');
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const handleManualEntry = () => { setEditedData({ positions: [{ asset: '', menge: 0, einstand: 0, kurs: 0, wertCHF: 0, plPct: 0 }] }); setMode('review'); };
  const updateField = (idx, key, value) => { const copy = { ...editedData }; copy.positions[idx][key] = key === 'asset' ? value : parseFloat(value) || 0; setEditedData(copy); };
  const handleSave = () => { onSave(editedData.positions); onClose(); };

  if (!open) return null;
  if (mode === null) return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
      <div className="bg-zinc-950 border border-zinc-800 max-w-md w-full">
        <div className="flex items-center justify-between border-b border-zinc-800 p-4"><div className="font-mono text-sm text-emerald-400">// UPDATE</div><button onClick={onClose}><X size={18} /></button></div>
        <div className="p-6"><h2 className="text-lg font-mono text-zinc-100 mb-4">Daten hinzufügen</h2><div className="space-y-3">
          <button onClick={() => setMode('screenshot')} className="w-full border border-zinc-800 hover:border-emerald-500/50 bg-zinc-900/50 p-4 text-left"><div className="font-mono text-sm text-emerald-400">📸 Screenshot(s) hochladen</div><div className="text-xs text-zinc-500 mt-1">Einzelnes Bild oder mehrere (Batch) – automatische Erkennung + EUR→CHF</div></button>
          <button onClick={handleManualEntry} className="w-full border border-zinc-800 hover:border-emerald-500/50 bg-zinc-900/50 p-4 text-left"><div className="font-mono text-sm text-emerald-400">✏️ Manuell eintragen</div><div className="text-xs text-zinc-500 mt-1">Positionen selbst eingeben (ohne KI)</div></button>
        </div></div>
      </div>
    </div>
  );
  if (mode === 'screenshot') return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
      <div className="bg-zinc-950 border border-zinc-800 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div className="flex justify-between border-b border-zinc-800 p-4"><div className="font-mono text-sm text-emerald-400">// SCREENSHOT UPLOAD</div><button onClick={onClose}><X size={18} /></button></div>
        <div className="p-6"><label className="flex items-center gap-2 mb-4 cursor-pointer"><input type="checkbox" checked={batchMode} onChange={(e) => setBatchMode(e.target.checked)} className="w-4 h-4" /><span className="text-xs font-mono text-zinc-300">Batch-Modus (mehrere Screenshots zusammenführen)</span></label>
        <div onClick={() => fileInputRef.current?.click()} className="border-2 border-dashed border-zinc-800 hover:border-emerald-500/50 bg-zinc-900/30 p-12 text-center cursor-pointer"><Upload className="mx-auto text-zinc-600 mb-3" size={32} /><div className="text-sm text-zinc-300 font-mono">{batchMode ? 'Mehrere Bilder auswählen' : 'Bild auswählen'}</div><div className="text-xs text-zinc-500 mt-1">{batchMode ? 'Mehrere Dateien möglich, werden zusammengeführt' : 'PNG, JPG'}</div></div>
        <input ref={fileInputRef} type="file" accept="image/*" multiple={batchMode} onChange={(e) => { const files = Array.from(e.target.files); if (!files.length) return; if (!batchMode && files.length > 1) { if (confirm('Mehrere Dateien ausgewählt. Batch-Modus verwenden?')) { setBatchMode(true); runBatchExtraction(files); } else { runSingleExtraction(files[0]); } } else if (batchMode || files.length > 1) { runBatchExtraction(files); } else { runSingleExtraction(files[0]); } }} className="hidden" />
        <div className="mt-4 flex justify-between"><button onClick={() => setMode(null)} className="text-xs text-zinc-500 hover:text-zinc-300">← Zurück</button><button onClick={() => setMode('manual')} className="text-xs text-emerald-400">Manuell →</button></div>
        {loading && (<div className="mt-6 text-center"><Loader2 className="mx-auto text-emerald-400 animate-spin mb-2" size={24} /><div className="text-xs text-zinc-500">{diagnosis}</div>{batchProgress.total > 0 && <div className="text-xs text-zinc-600 mt-1">Datei {batchProgress.current} / {batchProgress.total}</div>}</div>)}
        {error && <div className="mt-4 p-3 bg-red-500/10 border border-red-500/30 text-xs text-red-400">{error}<button onClick={() => setMode('manual')} className="block mt-2 text-emerald-400">→ Manuell eintragen</button></div>}
        </div>
      </div>
    </div>
  );
  if (mode === 'review' && editedData) return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
      <div className="bg-zinc-950 border border-zinc-800 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div className="flex justify-between border-b border-zinc-800 p-4"><div className="font-mono text-sm text-emerald-400">// WERTE PRÜFEN</div><button onClick={onClose}><X size={18} /></button></div>
        <div className="p-6"><h2 className="text-lg font-mono text-zinc-100 mb-1">Positionen prüfen</h2><p className="text-xs text-zinc-500 mb-4 font-mono">→ Editierbar, dann speichern</p>
        <div className="space-y-3 mb-6">{editedData.positions.map((pos, idx) => (<div key={idx} className="border border-zinc-800 bg-zinc-900/50 p-3"><div className="grid grid-cols-2 gap-2"><Field label="Asset" value={pos.asset} onChange={(v) => updateField(idx, 'asset', v)} type="text" /><Field label="Menge" value={pos.menge} onChange={(v) => updateField(idx, 'menge', v)} /><Field label="Einstand" value={pos.einstand} onChange={(v) => updateField(idx, 'einstand', v)} /><Field label="Kurs" value={pos.kurs} onChange={(v) => updateField(idx, 'kurs', v)} /><Field label="Wert CHF" value={pos.wertCHF} onChange={(v) => updateField(idx, 'wertCHF', v)} /><Field label="P/L %" value={pos.plPct} onChange={(v) => updateField(idx, 'plPct', v)} /></div></div>))}</div>
        <div className="flex gap-2"><button onClick={handleSave} className="flex-1 bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-mono text-sm py-2"><Check size={14} className="inline mr-1" /> ÜBERNEHMEN</button><button onClick={onClose} className="px-4 border border-zinc-800 hover:border-zinc-700 text-zinc-400 font-mono text-sm py-2">VERWERFEN</button></div></div>
      </div>
    </div>
  );
  return null;
};

const EtfsTab = ({ data, onUpdate }) => {
  const etfKeys = Object.keys(data.positions).filter(k => data.positions[k].category === 'etf');
  const [editingHolding, setEditingHolding] = useState(null);
  const updateHolding = (etfKey, holdingIdx, field, value) => {
    const newData = { ...data };
    const holding = newData.positions[etfKey].holdings[holdingIdx];
    holding[field] = field === 'menge' || field === 'wertEUR' ? parseFloat(value) : value;
    if (field === 'wertEUR' && newData.positions[etfKey].holdings[holdingIdx]) {
      const eurRate = loadEurRate(); // aktuelle Rate aus localStorage
      holding.wertCHF = holding.wertEUR * eurRate;
    }
    // Gesamtwert des ETF neu berechnen
    const totalCHF = newData.positions[etfKey].holdings.reduce((sum, h) => sum + (h.wertCHF || 0), 0);
    newData.positions[etfKey].wertCHF = totalCHF;
    newData.positions[etfKey].plPct = (newData.positions[etfKey].einstand && newData.positions[etfKey].einstand > 0) ? ((newData.positions[etfKey].kurs - newData.positions[etfKey].einstand)/newData.positions[etfKey].einstand)*100 : 0;
    onUpdate(newData);
    setEditingHolding(null);
  };
  return (
    <div className="grid md:grid-cols-2 gap-4">
      {etfKeys.map(k => {
        const p = data.positions[k];
        const holdings = p.holdings || [];
        return (
          <div key={k} className="border border-zinc-800 bg-zinc-950/50 p-4">
            <div className="text-xs text-zinc-500">{p.platform}</div>
            <div className="text-xl font-mono">{p.label}</div>
            <div className="text-3xl font-mono mt-3">{fmt(p.wertCHF)} <span className="text-base text-zinc-500">CHF</span></div>
            <div className={`text-xs mt-1 ${p.plPct>0?'text-emerald-400':'text-zinc-500'}`}>{p.plPct ? fmtPct(p.plPct) : '–'}</div>
            {holdings.length > 0 && (
              <div className="mt-4 border-t border-zinc-800 pt-3">
                <div className="text-[10px] uppercase text-zinc-500 mb-2">// ENTHALTENE POSITIONEN</div>
                <table className="w-full text-xs font-mono">
                  <thead><tr className="text-zinc-500"><th className="text-left">Name</th><th className="text-right">Stk</th><th className="text-right">EUR</th><th className="text-right">CHF</th><th></th></tr></thead>
                  <tbody>
                    {holdings.map((h, idx) => (
                      <tr key={idx} className="border-b border-zinc-800/50">
                        {editingHolding === `${k}-${idx}` ? (
                          <td colSpan="5" className="p-2">
                            <div className="grid grid-cols-4 gap-1">
                              <input type="text" defaultValue={h.name} onBlur={(e) => updateHolding(k, idx, 'name', e.target.value)} className="bg-zinc-900 border border-zinc-700 text-xs p-1" placeholder="Name" />
                              <input type="number" defaultValue={h.menge} onBlur={(e) => updateHolding(k, idx, 'menge', e.target.value)} className="bg-zinc-900 border border-zinc-700 text-xs p-1" placeholder="Menge" />
                              <input type="number" defaultValue={h.wertEUR} onBlur={(e) => updateHolding(k, idx, 'wertEUR', e.target.value)} className="bg-zinc-900 border border-zinc-700 text-xs p-1" placeholder="Wert EUR" />
                              <button onClick={() => setEditingHolding(null)} className="text-emerald-400 text-xs">✔</button>
                            </div>
                          </td>
                        ) : (
                          <>
                            <td className="py-1">{h.name}</td>
                            <td className="text-right">{fmt(h.menge, 0)}</td>
                            <td className="text-right">{fmt(h.wertEUR, 0)} €</td>
                            <td className="text-right">{fmt(h.wertCHF, 0)}</td>
                            <td className="text-right"><button onClick={() => setEditingHolding(`${k}-${idx}`)}><Edit size={12} /></button></td>
                          </>
                        )}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

const Dashboard = ({ data, onUpdate, onOpenUpload, onOpenSettings }) => {
  const [tab, setTab] = useState('overview');
  const [activeCategory, setActiveCategory] = useState(null);
  const total = calcTotal(data.positions);
  const alloc = calcAllocation(data.positions);
  const history = data.history.total || [];
  const prev = history.length > 1 ? history[history.length-2].wertCHF : total;
  const totalChange = total - prev;
  const totalChangePct = prev ? (totalChange/prev)*100 : 0;
  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-200">
      <header className="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
          <Logo />
          <div className="flex gap-2">
            <button onClick={onOpenUpload} className="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-mono text-xs px-3 py-2 flex gap-1 items-center"><Plus size={14} />UPDATE</button>
            <button onClick={onOpenSettings} className="border border-zinc-800 hover:border-zinc-700 p-2"><Settings size={14} /></button>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-4 flex gap-1 -mb-px overflow-x-auto">
          {['overview','crypto','etfs'].map(id => <button key={id} onClick={()=>setTab(id)} className={`px-3 py-2 text-xs font-mono border-b-2 whitespace-nowrap ${tab===id ? 'border-emerald-400 text-emerald-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}>{id==='overview'?'ÜBERSICHT':id==='crypto'?'KRYPTO':'ETFs'}</button>)}
        </div>
      </header>
      <main className="max-w-7xl mx-auto px-4 py-6">
        {tab === 'overview' && <OverviewTab data={data} total={total} totalChange={totalChange} totalChangePct={totalChangePct} alloc={alloc} activeCategory={activeCategory} setActiveCategory={setActiveCategory} />}
        {tab === 'crypto' && <CryptoTab data={data} />}
        {tab === 'etfs' && <EtfsTab data={data} onUpdate={onUpdate} />}
      </main>
    </div>
  );
};

// 12. SETTINGS MODAL (mit EUR/CHF Kurs)
// ============================================================
const SettingsModal = ({ open, onClose, data, onUpdate, workerUrl, onWorkerUrlChange, modelName, onModelNameChange, eurRate, onEurRateChange }) => {
  const [editUrl, setEditUrl] = useState(workerUrl);
  const [showUrl, setShowUrl] = useState(false);
  const [editModel, setEditModel] = useState(modelName);
  const [editEurRate, setEditEurRate] = useState(eurRate);
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);
  useEffect(() => { setEditUrl(workerUrl); setEditModel(modelName); setEditEurRate(eurRate); }, [workerUrl, modelName, eurRate, open]);
  const runTest = async () => {
    setTesting(true);
    try {
      const res = await fetch(editUrl, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: editModel, system: 'Antworte mit PONG', messages: [{ role: 'user', content: [{ type: 'text', text: 'PONG' }] }], max_tokens: 10 })
      });
      const txt = await res.text();
      setTestResult({ ok: res.ok, log: `Status ${res.status}\n${txt.slice(0,300)}` });
    } catch(e) { setTestResult({ ok: false, log: e.message }); }
    setTesting(false);
  };
  if (!open) return null;
  const handleExport = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})); a.download = `portfolio-${data.meta.lastUpdate}.json`; a.click(); };
  const handleImport = (e) => { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload = ev => { try { onUpdate(JSON.parse(ev.target.result)); onClose(); } catch{ alert('Fehler beim Import'); } }; r.readAsText(f); } };
  const handleReset = () => { if(confirm('Zurücksetzen auf Seed-Daten?')){ onUpdate(SEED_DATA); onClose(); } };
  return (
    <div className="fixed inset-0 bg-black/80 z-50 flex justify-center items-center p-4">
      <div className="bg-zinc-950 border border-zinc-800 max-w-md w-full max-h-[90vh] overflow-auto">
        <div className="flex justify-between items-center border-b border-zinc-800 p-4"><div className="font-mono text-sm text-emerald-400">// SETTINGS</div><button onClick={onClose}><X size={18} /></button></div>
        <div className="p-6 space-y-6">
          <div><div className="text-xs font-mono text-zinc-400 mb-2">Claude Proxy-URL</div><div className="relative"><input type={showUrl?'text':'password'} value={editUrl} onChange={e=>setEditUrl(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 px-3 py-2 pr-10 text-sm font-mono" /><button onClick={()=>setShowUrl(!showUrl)} className="absolute right-2 top-1/2 -translate-y-1/2">{showUrl?<EyeOff size={16}/>:<Eye size={16}/>}</button></div><button onClick={()=>onWorkerUrlChange(editUrl)} className="mt-2 text-xs text-emerald-400">→ Speichern</button></div>
          <div><div className="text-xs font-mono text-zinc-400 mb-2">Claude Modell</div><input type="text" value={editModel} onChange={e=>setEditModel(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 px-3 py-2 text-sm font-mono" /><button onClick={()=>onModelNameChange(editModel)} className="mt-2 text-xs text-emerald-400">→ Speichern</button></div>
          <div><div className="text-xs font-mono text-zinc-400 mb-2">EUR/CHF Wechselkurs</div><input type="number" step="0.001" value={editEurRate} onChange={e=>setEditEurRate(parseFloat(e.target.value))} className="w-full bg-zinc-950 border border-zinc-800 px-3 py-2 text-sm font-mono" /><button onClick={()=>onEurRateChange(editEurRate)} className="mt-2 text-xs text-emerald-400">→ Speichern & für Uploads verwenden</button></div>
          <div><button onClick={runTest} disabled={testing} className="w-full border border-zinc-800 py-2 text-xs font-mono flex justify-center gap-2">{testing?<Loader2 className="animate-spin" size={14}/>:null}{testing?'TESTE...':'PROXY VERBINDUNG TESTEN'}</button>{testResult && <div className={`mt-2 p-2 border text-[10px] font-mono ${testResult.ok?'border-emerald-500/30 text-emerald-300':'border-red-500/30 text-red-300'}`}>{testResult.log}</div>}</div>
          <div className="border-t border-zinc-800 pt-6"><div className="text-xs font-mono text-zinc-400 mb-2">Daten</div><div className="space-y-2"><button onClick={handleExport} className="w-full border border-zinc-800 py-2 text-xs font-mono flex justify-center gap-2"><Download size={14}/>JSON EXPORTIEREN</button><label className="block w-full border border-zinc-800 py-2 text-xs font-mono text-center cursor-pointer"><Upload size={14} className="inline mr-1"/>JSON IMPORTIEREN<input type="file" accept=".json" onChange={handleImport} className="hidden"/></label><button onClick={handleReset} className="w-full border border-red-500/30 text-red-400 py-2 text-xs font-mono"><Trash2 size={14} className="inline mr-1"/>ZURÜCKSETZEN</button></div></div>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// 13. HAUPT-APP
// ============================================================
function App() {
  const [data, setData] = useState(null);
  const [workerUrl, setWorkerUrl] = useState(DEFAULT_WORKER_URL);
  const [modelName, setModelName] = useState(DEFAULT_MODEL);
  const [eurRate, setEurRate] = useState(DEFAULT_EUR_RATE);
  const [uploadOpen, setUploadOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [booted, setBooted] = useState(false);

  useEffect(() => {
    const stored = loadData();
    const url = loadWorkerUrl();
    const model = loadModelName();
    const rate = loadEurRate();
    setData(stored || SEED_DATA);
    setWorkerUrl(url);
    setModelName(model);
    setEurRate(rate);
    setBooted(true);
  }, []);

  useEffect(() => { if (data && booted) saveData(data); }, [data, booted]);

  const handleSaveExtracted = (positions) => {
    const newData = JSON.parse(JSON.stringify(data));
    const today = new Date().toISOString().slice(0,10);
    for (const p of positions) {
      if (!p.asset) continue;
      const ticker = p.asset.toUpperCase().replace(/[^A-Z0-9-]/g, '');
      const keyMap = { 'BTC':'btc','ETH':'eth','SOL':'sol','KAS':'kas','RNDR':'rndr','RENDER':'rndr','V3AA':'v3aaCH','VIAC':'viac','ETF-DE':'etfDE','CASH':'cash' };
      const key = keyMap[ticker];
      if (key && newData.positions[key]) {
        Object.keys(p).forEach(f => { if (f !== 'asset' && p[f] != null) newData.positions[key][f] = p[f]; });
        if (!newData.history[key]) newData.history[key] = [];
        newData.history[key].push({ date: today, wertCHF: newData.positions[key].wertCHF });
      }
    }
    const newTotal = calcTotal(newData.positions);
    if (!newData.history.total) newData.history.total = [];
    newData.history.total.push({ date: today, wertCHF: newTotal });
    newData.meta.lastUpdate = today;
    setData(newData);
  };

  if (!booted) return <div className="min-h-screen bg-zinc-950 flex justify-center items-center"><Loader2 className="text-emerald-400 animate-spin" size={24} /></div>;

  return (
    <>
      <Dashboard data={data} onUpdate={setData} onOpenUpload={()=>setUploadOpen(true)} onOpenSettings={()=>setSettingsOpen(true)} />
      <UploadModal open={uploadOpen} onClose={()=>setUploadOpen(false)} onSave={handleSaveExtracted} workerUrl={workerUrl} modelName={modelName} eurRate={eurRate} />
      <SettingsModal open={settingsOpen} onClose={()=>setSettingsOpen(false)} data={data} onUpdate={setData} workerUrl={workerUrl} onWorkerUrlChange={setWorkerUrl} modelName={modelName} onModelNameChange={setModelName} eurRate={eurRate} onEurRateChange={setEurRate} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
